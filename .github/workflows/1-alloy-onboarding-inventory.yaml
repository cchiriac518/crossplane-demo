name: 🟢 Alloy Onboarding — Update State & Open PR

on:
  issues:
    types: [opened, edited]

jobs:
  onboard:
    if: contains(github.event.issue.labels.*.name, 'alloy-onboarding')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 1. Parse issue body
      #    GitHub issue forms render as:  ### Field Label\n\nvalue
      # ----------------------------------------------------------------
      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          get_field() {
            echo "$ISSUE_BODY" | grep -A2 "^### $1" | tail -1 | xargs
          }
          get_area() {
            echo "$ISSUE_BODY" \
              | awk "/^### $1/{found=1; next} found && /^###/{exit} found{print}" \
              | grep -v '_No response_' \
              | sed '/^[[:space:]]*$/d'
          }

          TEAM=$(get_field     "Team Name")
          COMPONENT=$(get_field "Component Name")
          REGION=$(get_field   "Azure Region")

          DEV_SP=$(get_field   "DEV — Service Principal .SP. Object ID or App ID")
          INT_SP=$(get_field   "INT — Service Principal .SP. Object ID or App ID")
          PRE_SP=$(get_field   "PRE — Service Principal .SP. Object ID or App ID")
          PROD_SP=$(get_field  "PROD — Service Principal .SP. Object ID or App ID")

          EOF=$(openssl rand -hex 8)

          METRICS_DEV=$(get_area  "DEV — Subscription ID.s.")
          echo "metrics_dev<<$EOF"  >> $GITHUB_OUTPUT
          echo "$METRICS_DEV"       >> $GITHUB_OUTPUT
          echo "$EOF"               >> $GITHUB_OUTPUT

          METRICS_INT=$(get_area  "INT — Subscription ID.s.")
          echo "metrics_int<<$EOF"  >> $GITHUB_OUTPUT
          echo "$METRICS_INT"       >> $GITHUB_OUTPUT
          echo "$EOF"               >> $GITHUB_OUTPUT

          METRICS_PRE=$(get_area  "PRE — Subscription ID.s.")
          echo "metrics_pre<<$EOF"  >> $GITHUB_OUTPUT
          echo "$METRICS_PRE"       >> $GITHUB_OUTPUT
          echo "$EOF"               >> $GITHUB_OUTPUT

          METRICS_PROD=$(get_area "PROD — Subscription ID.s.")
          echo "metrics_prod<<$EOF" >> $GITHUB_OUTPUT
          echo "$METRICS_PROD"      >> $GITHUB_OUTPUT
          echo "$EOF"               >> $GITHUB_OUTPUT

          SAFE=$(echo "$TEAM" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '_')
          BRANCH="feature/onboarding_${SAFE}_#${{ github.event.issue.number }}"

          echo "team=$TEAM"         >> $GITHUB_OUTPUT
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "region=$REGION"     >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"     >> $GITHUB_OUTPUT
          echo "safe=$SAFE"         >> $GITHUB_OUTPUT
          echo "dev_sp=$DEV_SP"     >> $GITHUB_OUTPUT
          echo "int_sp=$INT_SP"     >> $GITHUB_OUTPUT
          echo "pre_sp=$PRE_SP"     >> $GITHUB_OUTPUT
          echo "prod_sp=$PROD_SP"   >> $GITHUB_OUTPUT

          echo "✅ Parsed: team=$TEAM component=$COMPONENT region=$REGION"

      # ----------------------------------------------------------------
      # 2. Validate — fail fast with issue comment
      # ----------------------------------------------------------------
      - name: Validate inputs
        id: validate
        env:
          TEAM:      ${{ steps.parse.outputs.team }}
          COMPONENT: ${{ steps.parse.outputs.component }}
          REGION:    ${{ steps.parse.outputs.region }}
          DEV_SP:    ${{ steps.parse.outputs.dev_sp }}
          INT_SP:    ${{ steps.parse.outputs.int_sp }}
          PRE_SP:    ${{ steps.parse.outputs.pre_sp }}
          PROD_SP:   ${{ steps.parse.outputs.prod_sp }}
        run: |
          ERRORS=""

          [ -z "$TEAM" ]      && ERRORS="$ERRORS\n- ❌ Team Name is required"
          [ -z "$COMPONENT" ] && ERRORS="$ERRORS\n- ❌ Component Name is required"
          [ -z "$REGION" ]    && ERRORS="$ERRORS\n- ❌ Azure Region is required"

          if [ -n "$TEAM" ] && ! echo "$TEAM" | grep -qE '^[a-zA-Z0-9-]+$'; then
            ERRORS="$ERRORS\n- ❌ Team Name must contain only letters, numbers, hyphens (got: $TEAM)"
          fi

          if [ -n "$REGION" ] && ! echo "$REGION" | grep -qE '^(euw|usw2|use|aue)$'; then
            ERRORS="$ERRORS\n- ❌ Region must be one of: euw, usw2, use, aue (got: $REGION)"
          fi

          validate_uuid() {
            local NAME=$1 VAL=$2
            [ -z "$VAL" ] && return
            if ! echo "$VAL" | grep -qiE \
              '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
              ERRORS="$ERRORS\n- ❌ $NAME is not a valid UUID (got: $VAL)"
            fi
          }

          validate_uuid "DEV SP"  "$DEV_SP"
          validate_uuid "INT SP"  "$INT_SP"
          validate_uuid "PRE SP"  "$PRE_SP"
          validate_uuid "PROD SP" "$PROD_SP"

          if [ -z "$DEV_SP" ] && [ -z "$INT_SP" ] && \
             [ -z "$PRE_SP" ] && [ -z "$PROD_SP" ]; then
            ERRORS="$ERRORS\n- ❌ At least one Service Principal must be provided"
          fi

          if [ -n "$ERRORS" ]; then
            echo "failed=true"                   >> $GITHUB_OUTPUT
            printf "$ERRORS" > /tmp/val_errors.txt
          else
            echo "failed=false"                  >> $GITHUB_OUTPUT
          fi

      - name: Comment validation errors
        if: steps.validate.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const errors = fs.readFileSync('/tmp/val_errors.txt', 'utf8');
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `## ❌ Onboarding validation failed\n\nPlease fix the following and edit the issue to re-trigger:\n\n${errors}`,
            });

      - name: Fail on validation errors
        if: steps.validate.outputs.failed == 'true'
        run: exit 1

      # ----------------------------------------------------------------
      # 3. Install yq
      # ----------------------------------------------------------------
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      # ----------------------------------------------------------------
      # 4. Setup git + create/reset feature branch
      # ----------------------------------------------------------------
      - name: Setup git and branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ steps.parse.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      # ----------------------------------------------------------------
      # 5. Update state files with yq
      #
      #    Captures ANY difference vs current state:
      #      - new team
      #      - existing team, new component
      #      - existing team, SP changed
      #      - existing team, new sub_id
      # ----------------------------------------------------------------
      - name: Update dev-state
        if: steps.parse.outputs.dev_sp != '' || steps.parse.outputs.int_sp != ''
        env:
          TEAM:        ${{ steps.parse.outputs.team }}
          COMPONENT:   ${{ steps.parse.outputs.component }}
          DEV_SP:      ${{ steps.parse.outputs.dev_sp }}
          INT_SP:      ${{ steps.parse.outputs.int_sp }}
          METRICS_DEV: ${{ steps.parse.outputs.metrics_dev }}
          METRICS_INT: ${{ steps.parse.outputs.metrics_int }}
          FILE:        terraform/envs/dev-eu/alloy-onboarding-state-dev-eu.yaml
        run: |
          [ -f "$FILE" ] || echo '{}' > "$FILE"

          update_env() {
            local ENV=$1 SP=$2 METRICS=$3
            [ -z "$SP" ] && return

            # Create team block if it doesn't exist
            if [ "$(yq ".${ENV}.Teams.${TEAM}" "$FILE")" = "null" ]; then
              yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Components = []" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs = []" "$FILE"
              echo "  [${ENV}] Created team: $TEAM"
            else
              # Update SP if changed
              CURRENT_SP=$(yq ".${ENV}.Teams.${TEAM}.SP" "$FILE")
              if [ "$CURRENT_SP" != "$SP" ]; then
                yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
                echo "  [${ENV}] Updated SP: $CURRENT_SP → $SP"
              else
                echo "  [${ENV}] SP unchanged: $SP"
              fi
            fi

            # Append component if not present (unique prevents duplicates)
            BEFORE=$(yq ".${ENV}.Teams.${TEAM}.Components" "$FILE")
            yq -i ".${ENV}.Teams.${TEAM}.Components += [\"${COMPONENT}\"] |
                   .${ENV}.Teams.${TEAM}.Components |= unique" "$FILE"
            AFTER=$(yq ".${ENV}.Teams.${TEAM}.Components" "$FILE")
            [ "$BEFORE" != "$AFTER" ] \
              && echo "  [${ENV}] Added component: $COMPONENT" \
              || echo "  [${ENV}] Component already present: $COMPONENT"

            # Append new metrics subs
            if [ -n "$METRICS" ]; then
              while IFS= read -r SUB; do
                SUB=$(echo "$SUB" | xargs)
                [ -z "$SUB" ] && continue
                if ! echo "$SUB" | grep -qiE \
                  '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
                  echo "  [${ENV}] ⚠️  Invalid UUID skipped: $SUB"
                  continue
                fi
                BEFORE=$(yq ".${ENV}.Teams.${TEAM}.Metrics_subs" "$FILE")
                yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs += [\"${SUB}\"] |
                       .${ENV}.Teams.${TEAM}.Metrics_subs |= unique" "$FILE"
                AFTER=$(yq ".${ENV}.Teams.${TEAM}.Metrics_subs" "$FILE")
                [ "$BEFORE" != "$AFTER" ] \
                  && echo "  [${ENV}] Added sub: $SUB" \
                  || echo "  [${ENV}] Sub already present: $SUB"
              done <<< "$METRICS"
            fi
          }

          update_env "DEV" "$DEV_SP" "$METRICS_DEV"
          update_env "INT" "$INT_SP" "$METRICS_INT"

          echo "--- dev-state after update ---"
          cat "$FILE"

      - name: Update prd-state
        if: steps.parse.outputs.pre_sp != '' || steps.parse.outputs.prod_sp != ''
        env:
          TEAM:         ${{ steps.parse.outputs.team }}
          COMPONENT:    ${{ steps.parse.outputs.component }}
          PRE_SP:       ${{ steps.parse.outputs.pre_sp }}
          PROD_SP:      ${{ steps.parse.outputs.prod_sp }}
          METRICS_PRE:  ${{ steps.parse.outputs.metrics_pre }}
          METRICS_PROD: ${{ steps.parse.outputs.metrics_prod }}
          FILE:         terraform/envs/prd-eu/alloy-onboarding-state-prd-eu.yaml
        run: |
          [ -f "$FILE" ] || echo '{}' > "$FILE"

          update_env() {
            local ENV=$1 SP=$2 METRICS=$3
            [ -z "$SP" ] && return

            if [ "$(yq ".${ENV}.Teams.${TEAM}" "$FILE")" = "null" ]; then
              yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Components = []" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs = []" "$FILE"
              echo "  [${ENV}] Created team: $TEAM"
            else
              CURRENT_SP=$(yq ".${ENV}.Teams.${TEAM}.SP" "$FILE")
              if [ "$CURRENT_SP" != "$SP" ]; then
                yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
                echo "  [${ENV}] Updated SP: $CURRENT_SP → $SP"
              else
                echo "  [${ENV}] SP unchanged: $SP"
              fi
            fi

            BEFORE=$(yq ".${ENV}.Teams.${TEAM}.Components" "$FILE")
            yq -i ".${ENV}.Teams.${TEAM}.Components += [\"${COMPONENT}\"] |
                   .${ENV}.Teams.${TEAM}.Components |= unique" "$FILE"
            AFTER=$(yq ".${ENV}.Teams.${TEAM}.Components" "$FILE")
            [ "$BEFORE" != "$AFTER" ] \
              && echo "  [${ENV}] Added component: $COMPONENT" \
              || echo "  [${ENV}] Component already present: $COMPONENT"

            if [ -n "$METRICS" ]; then
              while IFS= read -r SUB; do
                SUB=$(echo "$SUB" | xargs)
                [ -z "$SUB" ] && continue
                if ! echo "$SUB" | grep -qiE \
                  '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
                  echo "  [${ENV}] ⚠️  Invalid UUID skipped: $SUB"
                  continue
                fi
                BEFORE=$(yq ".${ENV}.Teams.${TEAM}.Metrics_subs" "$FILE")
                yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs += [\"${SUB}\"] |
                       .${ENV}.Teams.${TEAM}.Metrics_subs |= unique" "$FILE"
                AFTER=$(yq ".${ENV}.Teams.${TEAM}.Metrics_subs" "$FILE")
                [ "$BEFORE" != "$AFTER" ] \
                  && echo "  [${ENV}] Added sub: $SUB" \
                  || echo "  [${ENV}] Sub already present: $SUB"
              done <<< "$METRICS"
            fi
          }

          update_env "PRE" "$PRE_SP"  "$METRICS_PRE"
          update_env "PRD" "$PROD_SP" "$METRICS_PROD"

          echo "--- prd-state after update ---"
          cat "$FILE"

      # ----------------------------------------------------------------
      # 6. Sync state → tfvars (append-only)
      #
      #    Reads the updated state files and ensures tfvars reflects them:
      #      products            = ["team-component", ...]
      #      product_sp_assignments = [{ product, env, sp_id }, ...]
      #
      #    Only runs for the env(s) touched by this issue.
      # ----------------------------------------------------------------
      - name: Sync dev-state → dev-eu.tfvars
        if: steps.parse.outputs.dev_sp != '' || steps.parse.outputs.int_sp != ''
        env:
          STATE:  terraform/envs/dev-eu/alloy-onboarding-state-dev-eu.yaml
          TFVARS: terraform/envs/dev-eu/dev-eu.tfvars
          ENVS:   "DEV INT"
        run: |
          python3 << 'PYEOF'
          import re, sys, os

          state_file  = os.environ["STATE"]
          tfvars_file = os.environ["TFVARS"]
          envs        = os.environ["ENVS"].split()

          # --- read state via yq (already installed) ---
          import subprocess

          def yq(expr):
              r = subprocess.run(["yq", expr, state_file],
                                 capture_output=True, text=True)
              return r.stdout.strip()

          # --- read tfvars ---
          with open(tfvars_file) as f:
              tfvars = f.read()

          def add_product(tfvars, product):
              q = f'"{product}"'
              if q in tfvars:
                  print(f"  [products] Already present: {product}")
                  return tfvars
              # single-line list
              m = re.search(r'(^products\s*=\s*\[)(.*?)(\])', tfvars, re.MULTILINE)
              if m:
                  tfvars = tfvars[:m.start(3)] + f', {q}' + tfvars[m.start(3):]
              print(f"  [products] Added: {product}")
              return tfvars

          def add_sp(tfvars, product, env, sp_id):
              # Check already present
              block_re = re.compile(
                  r'\{\s*product\s*=\s*"' + re.escape(product) + r'"\s*'
                  r'env\s*=\s*"' + re.escape(env) + r'"', re.DOTALL)
              if block_re.search(tfvars):
                  print(f"  [sp] Already present: {product} / {env}")
                  return tfvars

              new_block = (
                  f'  {{\n'
                  f'    product = "{product}"\n'
                  f'    env     = "{env}"\n'
                  f'    sp_id   = "{sp_id}"\n'
                  f'  }}'
              )

              if 'product_sp_assignments' in tfvars:
                  # Add comma to current last entry, then append new (no trailing comma)
                  # Find the last } before the closing ] of product_sp_assignments
                  block_match = re.search(
                      r'(product_sp_assignments\s*=\s*\[)(.*?)(\n\])',
                      tfvars, re.DOTALL)
                  if block_match:
                      inner = block_match.group(2)
                      # Add comma to last closing brace if not already there
                      inner = re.sub(r'(\s*\})\s*$', r'\1,', inner.rstrip())
                      new_inner = inner + '\n' + new_block + '\n'
                      tfvars = (tfvars[:block_match.start(2)] +
                                new_inner +
                                tfvars[block_match.start(3):])
              else:
                  tfvars += (
                      f'\nproduct_sp_assignments = [\n'
                      f'{new_block}\n'
                      f']\n'
                  )
              print(f"  [sp] Added: {product} / {env}")
              return tfvars

          for env in envs:
              env_lower = env.lower()
              teams_raw = yq(f".{env}.Teams | keys | .[]")
              if not teams_raw:
                  continue
              for team in teams_raw.splitlines():
                  team = team.strip()
                  if not team:
                      continue
                  sp = yq(f".{env}.Teams.{team}.SP")
                  comps_raw = yq(f".{env}.Teams.{team}.Components[]")
                  for comp in comps_raw.splitlines():
                      comp = comp.strip()
                      if not comp:
                          continue
                      product = f"{team}-{comp}"
                      tfvars = add_product(tfvars, product)
                      if sp and sp != "null":
                          tfvars = add_sp(tfvars, product, env_lower, sp)

          with open(tfvars_file, "w") as f:
              f.write(tfvars)

          print("--- dev-eu.tfvars after sync ---")
          print(open(tfvars_file).read())
          PYEOF

      - name: Sync prd-state → prd-eu.tfvars
        if: steps.parse.outputs.pre_sp != '' || steps.parse.outputs.prod_sp != ''
        env:
          STATE:  terraform/envs/prd-eu/alloy-onboarding-state-prd-eu.yaml
          TFVARS: terraform/envs/prd-eu/prd-eu.tfvars
          ENVS:   "PRE PRD"
        run: |
          python3 << 'PYEOF'
          import re, sys, os, subprocess

          state_file  = os.environ["STATE"]
          tfvars_file = os.environ["TFVARS"]
          envs        = os.environ["ENVS"].split()

          def yq(expr):
              r = subprocess.run(["yq", expr, state_file],
                                 capture_output=True, text=True)
              return r.stdout.strip()

          with open(tfvars_file) as f:
              tfvars = f.read()

          def add_product(tfvars, product):
              q = f'"{product}"'
              if q in tfvars:
                  print(f"  [products] Already present: {product}")
                  return tfvars
              m = re.search(r'(^products\s*=\s*\[)(.*?)(\])', tfvars, re.MULTILINE)
              if m:
                  tfvars = tfvars[:m.start(3)] + f', {q}' + tfvars[m.start(3):]
              print(f"  [products] Added: {product}")
              return tfvars

          def add_sp(tfvars, product, env, sp_id):
              block_re = re.compile(
                  r'\{\s*product\s*=\s*"' + re.escape(product) + r'"\s*'
                  r'env\s*=\s*"' + re.escape(env) + r'"', re.DOTALL)
              if block_re.search(tfvars):
                  print(f"  [sp] Already present: {product} / {env}")
                  return tfvars

              new_block = (
                  f'  {{\n'
                  f'    product = "{product}"\n'
                  f'    env     = "{env}"\n'
                  f'    sp_id   = "{sp_id}"\n'
                  f'  }}'
              )

              if 'product_sp_assignments' in tfvars:
                  block_match = re.search(
                      r'(product_sp_assignments\s*=\s*\[)(.*?)(\n\])',
                      tfvars, re.DOTALL)
                  if block_match:
                      inner = block_match.group(2)
                      inner = re.sub(r'(\s*\})\s*$', r'\1,', inner.rstrip())
                      new_inner = inner + '\n' + new_block + '\n'
                      tfvars = (tfvars[:block_match.start(2)] +
                                new_inner +
                                tfvars[block_match.start(3):])
              else:
                  tfvars += (
                      f'\nproduct_sp_assignments = [\n'
                      f'{new_block}\n'
                      f']\n'
                  )
              print(f"  [sp] Added: {product} / {env}")
              return tfvars

          for env in envs:
              env_lower = env.lower()
              teams_raw = yq(f".{env}.Teams | keys | .[]")
              if not teams_raw:
                  continue
              for team in teams_raw.splitlines():
                  team = team.strip()
                  if not team:
                      continue
                  sp = yq(f".{env}.Teams.{team}.SP")
                  comps_raw = yq(f".{env}.Teams.{team}.Components[]")
                  for comp in comps_raw.splitlines():
                      comp = comp.strip()
                      if not comp:
                          continue
                      product = f"{team}-{comp}"
                      tfvars = add_product(tfvars, product)
                      if sp and sp != "null":
                          tfvars = add_sp(tfvars, product, env_lower, sp)

          with open(tfvars_file, "w") as f:
              f.write(tfvars)

          print("--- prd-eu.tfvars after sync ---")
          print(open(tfvars_file).read())
          PYEOF

      # ----------------------------------------------------------------
      # 7. Run terraform fmt to ensure tfvars are always clean
      # ----------------------------------------------------------------
      - name: Setup Terraform for fmt
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Run terraform fmt on tfvars
        run: |
          terraform fmt terraform/envs/dev-eu/dev-eu.tfvars || true
          terraform fmt terraform/envs/prd-eu/prd-eu.tfvars || true
          echo "✅ tfvars formatted"

      # ----------------------------------------------------------------
      # 8. Commit state + tfvars together
      # ----------------------------------------------------------------
      - name: Commit and push
        id: commit
        run: |
          git add \
            terraform/envs/dev-eu/alloy-onboarding-state-dev-eu.yaml \
            terraform/envs/prd-eu/alloy-onboarding-state-prd-eu.yaml \
            terraform/envs/dev-eu/dev-eu.tfvars \
            terraform/envs/prd-eu/prd-eu.tfvars

          if git diff --cached --quiet; then
            echo "::notice::No changes detected — everything already up to date"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "[alloy-onboarding] ${{ steps.parse.outputs.team }} (issue #${{ github.event.issue.number }})"
            git push origin "${{ steps.parse.outputs.branch }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------------------------------
      # 8. Open or update PR
      # ----------------------------------------------------------------
      - name: Create or update PR
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const head     = '${{ steps.parse.outputs.branch }}';
            const team     = '${{ steps.parse.outputs.team }}';
            const comp     = '${{ steps.parse.outputs.component }}';
            const region   = '${{ steps.parse.outputs.region }}';
            const issueNum = ${{ github.event.issue.number }};
            const devSP    = '${{ steps.parse.outputs.dev_sp }}';
            const intSP    = '${{ steps.parse.outputs.int_sp }}';
            const preSP    = '${{ steps.parse.outputs.pre_sp }}';
            const prodSP   = '${{ steps.parse.outputs.prod_sp }}';

            const touched = [
              (devSP || intSP)  ? '`dev-eu`' : '',
              (preSP || prodSP) ? '`prd-eu`' : '',
            ].filter(Boolean).join(', ');

            const title = `[alloy-onboarding] ${team} (issue #${issueNum})`;
            const body  = [
              `## 📡 Alloy Onboarding — State + tfvars Update`,
              ``,
              `Closes #${issueNum}`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Team | \`${team}\` |`,
              `| Component | \`${comp}\` |`,
              `| Region | \`${region}\` |`,
              `| Envs touched | ${touched} |`,
              ``,
              `### SP Assignments`,
              `| Env | SP |`,
              `|-----|----|`,
              `| DEV | \`${devSP  || 'n/a'}\` |`,
              `| INT | \`${intSP  || 'n/a'}\` |`,
              `| PRE | \`${preSP  || 'n/a'}\` |`,
              `| PRD | \`${prodSP || 'n/a'}\` |`,
              ``,
              `### Files changed`,
              `- State file(s): source of truth updated`,
              `- tfvars: \`products\` list and \`product_sp_assignments\` synced`,
              ``,
              `### What happens after merge`,
              `Merging this PR triggers **Workflow 2** which will:`,
              `1. Run \`terraform plan\` then \`terraform apply\` for changed env(s)`,
              `2. Open a CM PR after all applies succeed`,
              ``,
              `> ⚠️ ConfigMaps are updated only after EventHubs are confirmed live.`,
            ].join('\n');

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:${head}`, state: 'open',
            });

            if (existing.data.length > 0) {
              await github.rest.pulls.update({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: existing.data[0].number,
                title, body,
              });
              console.log(`Updated PR #${existing.data[0].number}`);
            } else {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, head, base: 'main',
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['alloy-onboarding', 'terraform'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNum,
                body: [
                  `✅ PR #${pr.data.number} opened with state + tfvars updates for ${touched}.`,
                  ``,
                  `After merge, Terraform will plan and apply automatically.`,
                  `ConfigMaps will only be updated after EventHubs are confirmed live.`,
                ].join('\n'),
              });
              console.log(`Created PR #${pr.data.number}`);
            }

      - name: Comment — nothing changed
        if: steps.commit.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `ℹ️ No changes detected — all data from this issue already exists in state and tfvars. Nothing to do.`,
            });
