name: ⚙️ Alloy Onboarding — Plan, Apply & CM PR

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/envs/dev-eu/dev-eu.tfvars'
      - 'terraform/envs/prd-eu/prd-eu.tfvars'

jobs:
  # ----------------------------------------------------------------
  # Detect which tfvars changed in this push
  # ----------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev_changed: ${{ steps.diff.outputs.dev_changed }}
      prd_changed: ${{ steps.diff.outputs.prd_changed }}
      pr_number:   ${{ steps.find-pr.outputs.pr_number }}
      issue_number: ${{ steps.find-pr.outputs.issue_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Diff tfvars vs previous commit
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"

          if echo "$CHANGED" | grep -q "dev-eu.tfvars"; then
            echo "dev_changed=true"  >> $GITHUB_OUTPUT
          else
            echo "dev_changed=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "prd-eu.tfvars"; then
            echo "prd_changed=true"  >> $GITHUB_OUTPUT
          else
            echo "prd_changed=false" >> $GITHUB_OUTPUT
          fi

      # Find the PR that introduced this push (for commenting)
      # and extract original issue number from PR title
      - name: Find associated PR and issue
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const commit = context.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              commit_sha:  commit,
            });

            const onboardingPR = prs.data.find(pr =>
              pr.title.includes('[alloy-onboarding]')
            );

            if (onboardingPR) {
              const match = onboardingPR.title.match(/issue #(\d+)/);
              core.setOutput('pr_number',    onboardingPR.number);
              core.setOutput('issue_number', match ? match[1] : '');
              console.log(`Found PR #${onboardingPR.number}, issue #${match?.[1]}`);
            } else {
              core.setOutput('pr_number',    '');
              core.setOutput('issue_number', '');
              console.log('No [alloy-onboarding] PR found for this commit');
            }
  # ----------------------------------------------------------------
  # Open CM PR — only after ALL required applies succeed
  #
  # Reads state files, builds CM updates from scratch using yq,
  # opens a feature branch + PR for manual review.
  # ArgoCD syncs only after CM PR is approved and merged.
  # ----------------------------------------------------------------
  open-cm-pr:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Setup git and create CM branch
        id: branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Derive a branch name from the commit message (contains team + issue)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          # Commit msg format: "[alloy-onboarding] teamname (issue #42)"
          TEAM=$(echo "$COMMIT_MSG" \
            | sed 's/\[alloy-onboarding\] //' \
            | sed 's/ (issue.*//' \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs 'a-z0-9' '_')
          ISSUE=$(echo "$COMMIT_MSG" | grep -oP '(?<=issue #)\d+' || echo "0")

          BRANCH="feature/onboarding-cm-${TEAM}-#${ISSUE}"
          git checkout -b "$BRANCH"

          echo "branch=$BRANCH"   >> $GITHUB_OUTPUT
          echo "team=$TEAM"       >> $GITHUB_OUTPUT
          echo "issue=$ISSUE"     >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # Sync state → ConfigMaps (append-only, yq reads state)
      #
      # Only processes the envs whose applies actually ran and succeeded.
      # EVENTHUBS  += team-component-env-region-logs  (per team+component)
      # AZURE_SUBSCRIPTION_IDS += each Metrics_sub    (per team, per env)
      # ----------------------------------------------------------------
      - name: Sync state → ConfigMaps
        env:
          DEV_SUCCEEDED: "true"
          PRD_SUCCEEDED: "true"
        run: |
          sync_cms() {
            local STATE=$1
            local TF_ENV=$2
            local ENVS=$3

            [ ! -f "$STATE" ] && echo "State not found: $STATE" && return

            REGION=$(grep "^region_short" "terraform/envs/${TF_ENV}/"*tfvars \
              | awk -F'"' '{print $2}' | head -1)

            for ENV in $ENVS; do
              ENV_LOWER=$(echo "$ENV" | tr '[:upper:]' '[:lower:]')
              CM="gitops/deployments/alloy/${ENV_LOWER}/onboarding/alloy-onboarding-config.yaml"

              [ ! -f "$CM" ] && echo "::warning::CM not found: $CM" && continue
              echo "Processing $ENV → $CM"

              TEAMS=$(yq ".${ENV}.Teams | keys | .[]" "$STATE" 2>/dev/null || true)
              [ -z "$TEAMS" ] && echo "  No teams in $ENV" && continue

              while IFS= read -r TEAM; do
                [ -z "$TEAM" ] && continue

                # EventHubs: one per team+component
                COMPONENTS=$(yq ".${ENV}.Teams.${TEAM}.Components[]" \
                  "$STATE" 2>/dev/null || true)
                while IFS= read -r COMP; do
                  [ -z "$COMP" ] && continue
                  EH="${TEAM}-${COMP}-${ENV_LOWER}-${REGION}-logs"
                  if grep -q "$EH" "$CM"; then
                    echo "  [EH] Already present: $EH"
                  else
                    sed -i "s|\(EVENTHUBS:.*\)\"|\1, ${EH}\"|" "$CM"
                    echo "  [EH] Added: $EH"
                  fi
                done <<< "$COMPONENTS"

                # Subscription IDs
                SUBS=$(yq ".${ENV}.Teams.${TEAM}.Metrics_subs[]" \
                  "$STATE" 2>/dev/null || true)
                while IFS= read -r SUB; do
                  [ -z "$SUB" ] && continue
                  if grep -q "$SUB" "$CM"; then
                    echo "  [sub] Already present: $SUB"
                  else
                    sed -i "s|\(AZURE_SUBSCRIPTION_IDS:.*\)\"|\1, ${SUB}\"|" "$CM"
                    echo "  [sub] Added: $SUB"
                  fi
                done <<< "$SUBS"

              done <<< "$TEAMS"
            done
          }

          [ "$DEV_SUCCEEDED" = "true" ] && \
            sync_cms \
              "terraform/envs/dev-eu/alloy-onboarding-state-dev-eu.yaml" \
              "dev-eu" \
              "DEV INT"

          [ "$PRD_SUCCEEDED" = "true" ] && \
            sync_cms \
              "terraform/envs/prd-eu/alloy-onboarding-state-prd-eu.yaml" \
              "prd-eu" \
              "PRE PRD"

      - name: Commit and push CM changes
        id: commit
        run: |
          git add gitops/deployments/alloy/
          if git diff --cached --quiet; then
            echo "::notice::CMs already up to date — no CM PR needed"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat(onboarding): update Alloy CMs for ${{ steps.branch.outputs.team }} [issue #${{ steps.branch.outputs.issue }}]"
            git push origin "${{ steps.branch.outputs.branch }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open CM PR
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const team       = '${{ steps.branch.outputs.team }}';
            const issueNum   = '${{ steps.branch.outputs.issue }}';
            const branch     = '${{ steps.branch.outputs.branch }}';
            const liveEnvs = [
             '`dev-eu` (DEV + INT)',
             '`prd-eu` (PRE + PRD)',
            ].filter(Boolean).join(', ');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  branch,
              base:  'feature/test-logic',
              title: `[alloy-onboarding-cm] ${team} (issue #${issueNum})`,
              body:  [
                `## 🗺️ Alloy Onboarding — ConfigMap Updates`,
                ``,
                issueNum !== '0' ? `Follows up on issue #${issueNum}` : '',
                ``,
                `**EventHubs confirmed live for:** ${liveEnvs}`,
                ``,
                `### Changes`,
                `- New EventHub names appended to \`EVENTHUBS\` in env ConfigMaps`,
                `- New subscription IDs appended to \`AZURE_SUBSCRIPTION_IDS\` in env ConfigMaps`,
                ``,
                `### ⚠️ Before merging`,
                `- Verify EventHub names match what Terraform created`,
                `- Verify subscription IDs are correct per env`,
                `- **ArgoCD will sync immediately after merge**`,
              ].filter(l => l !== null).join('\n'),
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['alloy-onboarding', 'configmap', 'argocd'],
            });

            // Comment on original issue if we have a number
            if (issueNum && issueNum !== '0') {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: parseInt(issueNum),
                body: [
                  `### ✅ EventHubs are live`,
                  ``,
                  `ConfigMap PR #${pr.data.number} is ready for review.`,
                  `Please approve and merge it to complete the onboarding.`,
                  `ArgoCD will sync immediately after merge.`,
                ].join('\n'),
              });

              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: parseInt(issueNum),
                state:        'closed',
                state_reason: 'completed',
              });
            }

            console.log(`CM PR created: #${pr.data.number}`);
