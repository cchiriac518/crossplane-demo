name: 🔍 Debug Alloy Onboarding Issue

on:
  issues:
    types: [opened, edited]

jobs:
  parse-and-echo:
    name: Echo Issue Inputs
    runs-on: ubuntu-latest

    steps:
      - name: Parse team name and rename issue title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          TEAM_NAME=$(echo "$ISSUE_BODY" | grep -A1 "^### Team Name" | tail -n1 | xargs)
          echo "Parsed Team Name: $TEAM_NAME"

          if [ -n "$TEAM_NAME" ]; then
            NEW_TITLE="Azure Native Onboarding for Team: $TEAM_NAME"
            echo "Updating issue title to: $NEW_TITLE"
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --title "$NEW_TITLE"
          else
            echo "Team Name not found, skipping title update"
          fi

      - name: Parse and echo all fields
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          extract() {
            local label="$1"
            echo "$ISSUE_BODY" | grep -A1 "### $label" | tail -n1 | xargs
          }

          TEAM_NAME=$(extract 'Team Name')
          COMPONENT_NAME=$(extract 'Component Name')

          echo "========================================"
          echo "ISSUE NUMBER : ${{ github.event.issue.number }}"
          echo "ISSUE TITLE  : ${{ github.event.issue.title }}"
          echo "SUBMITTED BY : ${{ github.event.issue.user.login }}"
          echo "========================================"

          echo ""
          echo "======== GENERAL ========"
          echo "Team Name      : $TEAM_NAME"
          echo "Component Name : $COMPONENT_NAME"

          echo ""
          echo "======== LOGS — DEV ========"
          echo "Product (auto) : $TEAM_NAME"
          echo "Component      : $COMPONENT_NAME"
          echo "EventHub name  : ${TEAM_NAME}-${COMPONENT_NAME}-dev-<region_short>-logs"
          echo "SP             : $(extract 'DEV — Service Principal (SP) Object ID or App ID')"

          echo ""
          echo "======== LOGS — INT ========"
          echo "Product (auto) : $TEAM_NAME"
          echo "Component      : $COMPONENT_NAME"
          echo "EventHub name  : ${TEAM_NAME}-${COMPONENT_NAME}-int-<region_short>-logs"
          echo "SP             : $(extract 'INT — Service Principal (SP) Object ID or App ID')"

          echo ""
          echo "======== LOGS — PRE ========"
          echo "Product (auto) : $TEAM_NAME"
          echo "Component      : $COMPONENT_NAME"
          echo "EventHub name  : ${TEAM_NAME}-${COMPONENT_NAME}-pre-<region_short>-logs"
          echo "SP             : $(extract 'PRE — Service Principal (SP) Object ID or App ID')"

          echo ""
          echo "======== LOGS — PROD ========"
          echo "Product (auto) : $TEAM_NAME"
          echo "Component      : $COMPONENT_NAME"
          echo "EventHub name  : ${TEAM_NAME}-${COMPONENT_NAME}-prod-<region_short>-logs"
          echo "SP             : $(extract 'PROD — Service Principal (SP) Object ID or App ID')"

          echo ""
          echo "======== METRICS — DEV ========"
          echo "Subscription IDs:"
          echo "$ISSUE_BODY" | grep -A10 "DEV — Subscription ID" | grep -E '^[0-9a-f-]{36}$' | while read sub; do echo "  - $sub"; done

          echo ""
          echo "======== METRICS — INT ========"
          echo "Subscription IDs:"
          echo "$ISSUE_BODY" | grep -A10 "INT — Subscription ID" | grep -E '^[0-9a-f-]{36}$' | while read sub; do echo "  - $sub"; done

          echo ""
          echo "======== METRICS — PRE ========"
          echo "Subscription IDs:"
          echo "$ISSUE_BODY" | grep -A10 "PRE — Subscription ID" | grep -E '^[0-9a-f-]{36}$' | while read sub; do echo "  - $sub"; done

          echo ""
          echo "======== METRICS — PROD ========"
          echo "Subscription IDs:"
          echo "$ISSUE_BODY" | grep -A10 "PROD — Subscription ID" | grep -E '^[0-9a-f-]{36}$' | while read sub; do echo "  - $sub"; done

          echo ""
          echo "========================================"
          echo "Done parsing issue #${{ github.event.issue.number }}"
          echo "========================================"
