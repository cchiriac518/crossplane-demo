name: 🟢 Alloy Onboarding — Update State & Open PR

on:
  issues:
    types: [opened, edited]

jobs:
  onboard:
    if: contains(github.event.issue.labels.*.name, 'alloy-onboarding')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 1. Parse issue body
      #    GitHub issue forms render as:  ### Field Label\n\nvalue
      # ----------------------------------------------------------------
      - name: Parse issue body
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          get_field() {
            echo "$ISSUE_BODY" | grep -A2 "^### $1" | tail -1 | xargs
          }
          get_area() {
            echo "$ISSUE_BODY" \
              | awk "/^### $1/{found=1; next} found && /^###/{exit} found{print}" \
              | grep -v '_No response_' \
              | sed '/^[[:space:]]*$/d'
          }

          TEAM=$(get_field     "Team Name")
          COMPONENT=$(get_field "Component Name")
          REGION=$(get_field   "Azure Region")

          DEV_SP=$(get_field   "DEV — Service Principal .SP. Object ID or App ID")
          INT_SP=$(get_field   "INT — Service Principal .SP. Object ID or App ID")
          PRE_SP=$(get_field   "PRE — Service Principal .SP. Object ID or App ID")
          PROD_SP=$(get_field  "PROD — Service Principal .SP. Object ID or App ID")

          # Metrics subs: one per line → newline-separated
          METRICS_DEV=$(get_area  "DEV — Subscription ID.s.")
          METRICS_INT=$(get_area  "INT — Subscription ID.s.")
          METRICS_PRE=$(get_area  "PRE — Subscription ID.s.")
          METRICS_PROD=$(get_area "PROD — Subscription ID.s.")

          SAFE=$(echo "$TEAM" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '_')
          BRANCH="feature/onboarding_${SAFE}_#${{ github.event.issue.number }}"

          # Use multiline output delimiter for subs (they contain newlines)
          EOF=$(openssl rand -hex 8)

          echo "team=$TEAM"               >> $GITHUB_OUTPUT
          echo "component=$COMPONENT"     >> $GITHUB_OUTPUT
          echo "region=$REGION"           >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"           >> $GITHUB_OUTPUT
          echo "safe=$SAFE"               >> $GITHUB_OUTPUT
          echo "dev_sp=$DEV_SP"           >> $GITHUB_OUTPUT
          echo "int_sp=$INT_SP"           >> $GITHUB_OUTPUT
          echo "pre_sp=$PRE_SP"           >> $GITHUB_OUTPUT
          echo "prod_sp=$PROD_SP"         >> $GITHUB_OUTPUT

          echo "metrics_dev<<$EOF"        >> $GITHUB_OUTPUT
          echo "$METRICS_DEV"             >> $GITHUB_OUTPUT
          echo "$EOF"                     >> $GITHUB_OUTPUT

          echo "metrics_int<<$EOF"        >> $GITHUB_OUTPUT
          echo "$METRICS_INT"             >> $GITHUB_OUTPUT
          echo "$EOF"                     >> $GITHUB_OUTPUT

          echo "metrics_pre<<$EOF"        >> $GITHUB_OUTPUT
          echo "$METRICS_PRE"             >> $GITHUB_OUTPUT
          echo "$EOF"                     >> $GITHUB_OUTPUT

          echo "metrics_prod<<$EOF"       >> $GITHUB_OUTPUT
          echo "$METRICS_PROD"            >> $GITHUB_OUTPUT
          echo "$EOF"                     >> $GITHUB_OUTPUT

          echo "✅ Parsed: team=$TEAM component=$COMPONENT region=$REGION"

      # ----------------------------------------------------------------
      # 2. Validate inputs — fail fast with a clear issue comment
      # ----------------------------------------------------------------
      - name: Validate inputs
        id: validate
        env:
          TEAM:      ${{ steps.parse.outputs.team }}
          COMPONENT: ${{ steps.parse.outputs.component }}
          REGION:    ${{ steps.parse.outputs.region }}
          DEV_SP:    ${{ steps.parse.outputs.dev_sp }}
          INT_SP:    ${{ steps.parse.outputs.int_sp }}
          PRE_SP:    ${{ steps.parse.outputs.pre_sp }}
          PROD_SP:   ${{ steps.parse.outputs.prod_sp }}
        run: |
          ERRORS=""

          # Required fields
          [ -z "$TEAM" ]      && ERRORS="$ERRORS\n- ❌ Team Name is required"
          [ -z "$COMPONENT" ] && ERRORS="$ERRORS\n- ❌ Component Name is required"
          [ -z "$REGION" ]    && ERRORS="$ERRORS\n- ❌ Azure Region is required"

          # Team name: alphanumeric and hyphens only
          if [ -n "$TEAM" ] && ! echo "$TEAM" | grep -qE '^[a-zA-Z0-9-]+$'; then
            ERRORS="$ERRORS\n- ❌ Team Name must contain only letters, numbers, and hyphens (got: $TEAM)"
          fi

          # Region: known values only
          if [ -n "$REGION" ] && ! echo "$REGION" | grep -qE '^(euw|usw2|use|aue)$'; then
            ERRORS="$ERRORS\n- ❌ Azure Region must be one of: euw, usw2, use, aue (got: $REGION)"
          fi

          # UUID format validator
          validate_uuid() {
            local NAME=$1 VAL=$2
            [ -z "$VAL" ] && return   # optional field
            if ! echo "$VAL" | grep -qiE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
              ERRORS="$ERRORS\n- ❌ $NAME is not a valid UUID (got: $VAL)"
            fi
          }

          validate_uuid "DEV SP"  "$DEV_SP"
          validate_uuid "INT SP"  "$INT_SP"
          validate_uuid "PRE SP"  "$PRE_SP"
          validate_uuid "PROD SP" "$PROD_SP"

          # At least one env must have data
          if [ -z "$DEV_SP" ] && [ -z "$INT_SP" ] && [ -z "$PRE_SP" ] && [ -z "$PROD_SP" ]; then
            ERRORS="$ERRORS\n- ❌ At least one Service Principal must be provided"
          fi

          if [ -n "$ERRORS" ]; then
            echo "validation_failed=true" >> $GITHUB_OUTPUT
            echo "errors=$(printf "$ERRORS")" >> $GITHUB_OUTPUT
          else
            echo "validation_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment validation errors on issue
        if: steps.validate.outputs.validation_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `## ❌ Onboarding validation failed\n\nPlease fix the following and edit the issue to re-trigger:\n\n${{ steps.validate.outputs.errors }}`,
            });

      - name: Fail on validation errors
        if: steps.validate.outputs.validation_failed == 'true'
        run: exit 1

      # ----------------------------------------------------------------
      # 3. Install yq
      # ----------------------------------------------------------------
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      # ----------------------------------------------------------------
      # 4. Setup git + create/reset feature branch
      # ----------------------------------------------------------------
      - name: Setup git and branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ steps.parse.outputs.branch }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      # ----------------------------------------------------------------
      # 5. Update dev-state.yaml with yq (DEV + INT)
      #
      #    For each env:
      #      - Ensure team block exists with SP
      #      - Append component if not already listed
      #      - Append each metrics sub if not already listed
      #
      #    yq handles all YAML parsing — no sed/awk on structure
      # ----------------------------------------------------------------
      - name: Update dev-state.yaml
        if: steps.parse.outputs.dev_sp != '' || steps.parse.outputs.int_sp != ''
        env:
          TEAM:        ${{ steps.parse.outputs.team }}
          COMPONENT:   ${{ steps.parse.outputs.component }}
          DEV_SP:      ${{ steps.parse.outputs.dev_sp }}
          INT_SP:      ${{ steps.parse.outputs.int_sp }}
          METRICS_DEV: ${{ steps.parse.outputs.metrics_dev }}
          METRICS_INT: ${{ steps.parse.outputs.metrics_int }}
          FILE:        terraform/envs/dev-eu/alloy-onboarding-state-dev-eu.yaml
        run: |
          # Initialise file if it doesn't exist
          [ -f "$FILE" ] || echo '{}' > "$FILE"

          update_env() {
            local ENV=$1 SP=$2 METRICS=$3
            [ -z "$SP" ] && return

            echo "Processing $ENV / $TEAM..."

            # Create team block if it doesn't exist
            if [ "$(yq ".${ENV}.Teams.${TEAM}" "$FILE")" = "null" ]; then
              yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Components = []" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs = []" "$FILE"
              echo "  Created team block: $ENV/$TEAM"
            else
              # Update SP if it changed
              CURRENT_SP=$(yq ".${ENV}.Teams.${TEAM}.SP" "$FILE")
              if [ "$CURRENT_SP" != "$SP" ]; then
                yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
                echo "  Updated SP for $ENV/$TEAM: $SP"
              fi
            fi

            # Append component if not present (yq unique prevents duplicates)
            yq -i ".${ENV}.Teams.${TEAM}.Components += [\"${COMPONENT}\"] | \
                   .${ENV}.Teams.${TEAM}.Components |= unique" "$FILE"
            echo "  Ensured component: $COMPONENT"

            # Append each metrics sub if not present
            if [ -n "$METRICS" ]; then
              while IFS= read -r SUB; do
                SUB=$(echo "$SUB" | xargs)
                [ -z "$SUB" ] && continue

                # Validate UUID before adding
                if ! echo "$SUB" | grep -qiE \
                  '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
                  echo "  ::warning::Skipping invalid UUID for metrics sub: $SUB"
                  continue
                fi

                yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs += [\"${SUB}\"] | \
                       .${ENV}.Teams.${TEAM}.Metrics_subs |= unique" "$FILE"
                echo "  Ensured metrics sub: $SUB"
              done <<< "$METRICS"
            fi
          }

          update_env "DEV" "$DEV_SP" "$METRICS_DEV"
          update_env "INT" "$INT_SP" "$METRICS_INT"

          echo "--- dev-state.yaml ---"
          cat "$FILE"

      # ----------------------------------------------------------------
      # 6. Update prd-state.yaml with yq (PRE + PRD)
      # ----------------------------------------------------------------
      - name: Update prd-state.yaml
        if: steps.parse.outputs.pre_sp != '' || steps.parse.outputs.prod_sp != ''
        env:
          TEAM:         ${{ steps.parse.outputs.team }}
          COMPONENT:    ${{ steps.parse.outputs.component }}
          PRE_SP:       ${{ steps.parse.outputs.pre_sp }}
          PROD_SP:      ${{ steps.parse.outputs.prod_sp }}
          METRICS_PRE:  ${{ steps.parse.outputs.metrics_pre }}
          METRICS_PROD: ${{ steps.parse.outputs.metrics_prod }}
          FILE:         terraform/envs/prd-eu/alloy-onboarding-state-prd-eu.yaml
        run: |
          [ -f "$FILE" ] || echo '{}' > "$FILE"

          update_env() {
            local ENV=$1 SP=$2 METRICS=$3
            [ -z "$SP" ] && return

            echo "Processing $ENV / $TEAM..."

            if [ "$(yq ".${ENV}.Teams.${TEAM}" "$FILE")" = "null" ]; then
              yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Components = []" "$FILE"
              yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs = []" "$FILE"
              echo "  Created team block: $ENV/$TEAM"
            else
              CURRENT_SP=$(yq ".${ENV}.Teams.${TEAM}.SP" "$FILE")
              if [ "$CURRENT_SP" != "$SP" ]; then
                yq -i ".${ENV}.Teams.${TEAM}.SP = \"${SP}\"" "$FILE"
                echo "  Updated SP for $ENV/$TEAM: $SP"
              fi
            fi

            yq -i ".${ENV}.Teams.${TEAM}.Components += [\"${COMPONENT}\"] | \
                   .${ENV}.Teams.${TEAM}.Components |= unique" "$FILE"
            echo "  Ensured component: $COMPONENT"

            if [ -n "$METRICS" ]; then
              while IFS= read -r SUB; do
                SUB=$(echo "$SUB" | xargs)
                [ -z "$SUB" ] && continue
                if ! echo "$SUB" | grep -qiE \
                  '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
                  echo "  ::warning::Skipping invalid UUID: $SUB"
                  continue
                fi
                yq -i ".${ENV}.Teams.${TEAM}.Metrics_subs += [\"${SUB}\"] | \
                       .${ENV}.Teams.${TEAM}.Metrics_subs |= unique" "$FILE"
                echo "  Ensured metrics sub: $SUB"
              done <<< "$METRICS"
            fi
          }

          update_env "PRE" "$PRE_SP"  "$METRICS_PRE"
          update_env "PRD" "$PROD_SP" "$METRICS_PROD"

          echo "--- prd-state.yaml ---"
          cat "$FILE"

      # ----------------------------------------------------------------
      # 7. Commit state files only — tfvars and CMs are NOT touched here
      # ----------------------------------------------------------------
      - name: Commit and push
        id: commit
        run: |
          git add terraform/envs/dev-eu/alloy-onboarding-state-dev-eu.yaml \
                  terraform/envs/prd-eu/alloy-onboarding-state-prd-eu.yaml
          if git diff --cached --quiet; then
            echo "::notice::No changes to state — everything already up to date"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "[alloy-onboarding] ${{ steps.parse.outputs.team }} (issue #${{ github.event.issue.number }})"
            git push origin "${{ steps.parse.outputs.branch }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------------------------------
      # 8. Open or update the PR
      # ----------------------------------------------------------------
      - name: Create or update PR
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const head      = '${{ steps.parse.outputs.branch }}';
            const team      = '${{ steps.parse.outputs.team }}';
            const component = '${{ steps.parse.outputs.component }}';
            const region    = '${{ steps.parse.outputs.region }}';
            const issueNum  = ${{ github.event.issue.number }};
            const devSP     = '${{ steps.parse.outputs.dev_sp }}';
            const intSP     = '${{ steps.parse.outputs.int_sp }}';
            const preSP     = '${{ steps.parse.outputs.pre_sp }}';
            const prodSP    = '${{ steps.parse.outputs.prod_sp }}';

            const touched = [
              (devSP || intSP)   ? '`onboarding-dev-state.yaml`' : '',
              (preSP || prodSP)  ? '`onboarding-prd-state.yaml`' : '',
            ].filter(Boolean).join(', ');

            const title = `[alloy-onboarding] ${team} (issue #${issueNum})`;
            const body  = [
              `## 📡 Alloy Onboarding — State Update`,
              ``,
              `Closes #${issueNum}`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Team | \`${team}\` |`,
              `| Component | \`${component}\` |`,
              `| Region | \`${region}\` |`,
              `| State files changed | ${touched} |`,
              ``,
              `### SP Assignments`,
              `| Env | SP |`,
              `|-----|----|`,
              `| DEV | \`${devSP  || 'n/a'}\` |`,
              `| INT | \`${intSP  || 'n/a'}\` |`,
              `| PRE | \`${preSP  || 'n/a'}\` |`,
              `| PRD | \`${prodSP || 'n/a'}\` |`,
              ``,
              `### What happens next`,
              `1. **This PR open** → tfvars synced from state, \`terraform plan\` runs for changed env(s)`,
              `2. **PR merge** → \`terraform apply\` runs (dev first, then prd behind approval gate)`,
              `3. **After both applies succeed** → a separate CM PR is opened automatically`,
              `4. **CM PR merge** → ArgoCD picks up the ConfigMap changes`,
              ``,
              `> ⚠️ ConfigMaps are updated **only after** EventHubs are confirmed live.`,
            ].join('\n');

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:${head}`, state: 'open',
            });

            if (existing.data.length > 0) {
              await github.rest.pulls.update({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: existing.data[0].number,
                title, body,
              });
              console.log(`Updated PR #${existing.data[0].number}`);
            } else {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, head, base: 'main',
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['alloy-onboarding', 'terraform'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNum,
                body: [
                  `✅ PR #${pr.data.number} opened with state file updates.`,
                  ``,
                  `Terraform plan will run automatically for: ${touched}`,
                  ``,
                  `ConfigMaps will only be updated **after** EventHubs are confirmed live.`,
                ].join('\n'),
              });
              console.log(`Created PR #${pr.data.number}`);
            }

      - name: Comment — nothing changed
        if: steps.commit.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `ℹ️ No new entries found — all data from this issue already exists in the state files. No changes needed.`,
            });
